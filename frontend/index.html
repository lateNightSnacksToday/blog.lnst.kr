<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회원가입</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --card: #111111;
    --border: #222222;
    --border-focus: #444444;
    --text: #e8e8e8;
    --text-dim: #555555;
    --accent: #ffffff;
    --accent-dim: rgba(255,255,255,0.08);
    --radius: 18px;
    --input-radius: 10px;
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text);
    overflow: hidden;
  }

  /* subtle grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  .card {
    position: relative;
    z-index: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 48px 44px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 0 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04) inset;
    animation: fadeUp 0.45s cubic-bezier(.22,.68,0,1.2) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    text-align: center;
    margin-bottom: 36px;
    color: var(--text);
  }

  .title span {
    color: var(--accent);
  }

  .field {
    margin-bottom: 14px;
    animation: fieldIn 0.3s ease both;
  }

  @keyframes fieldIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .field label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 7px;
  }

  .field input {
    width: 100%;
    background: #0f0f0f;
    border: 1px solid var(--border);
    border-radius: var(--input-radius);
    padding: 13px 16px;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .field input::placeholder { color: #333; }

  .field input:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(255,255,255,0.04);
  }

  /* 6-digit code row */
  .code-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 14px;
    animation: fieldIn 0.3s ease both;
  }

  .code-row input {
    width: 48px;
    height: 56px;
    text-align: center;
    font-size: 22px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    background: #0f0f0f;
    border: 1px solid var(--border);
    border-radius: var(--input-radius);
    color: var(--accent);
    outline: none;
    caret-color: var(--accent);
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.1s;
  }

  .code-row input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(255,255,255,0.08);
    transform: scale(1.06);
  }

  .code-row input.filled {
    border-color: #333;
    color: var(--accent);
  }

  /* password fields */
  .pw-hint {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 14px;
    text-align: center;
    animation: fieldIn 0.3s ease both;
  }

  .btn {
    width: 100%;
    margin-top: 8px;
    padding: 14px;
    border: none;
    border-radius: var(--input-radius);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, background 0.2s;
    animation: fieldIn 0.3s ease both;
  }

  .btn-primary {
    background: var(--accent);
    color: #0a0a0a;
    box-shadow: 0 4px 24px rgba(255,255,255,0.1);
  }

  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 32px rgba(255,255,255,0.2);
  }

  .btn-primary:active { transform: translateY(0); }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none !important;
    box-shadow: none !important;
  }

  .step-label {
    font-size: 11px;
    text-align: center;
    color: var(--text-dim);
    margin-bottom: 24px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    animation: fieldIn 0.3s ease both;
  }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="title">회원<span>가입</span></div>
  <div id="content"></div>
</div>

<script>
  const content = document.getElementById('content');
  let savedEmail = '', savedNickname = '', savedHashedCode = '';

  /* ── STEP 1: 닉네임 / 이메일 ── */
  function renderStep1(email = '', nickname = '') {
    content.innerHTML = `
      <div class="field" style="animation-delay:0.05s">
        <label>닉네임</label>
        <input id="nickname" type="text" placeholder="사용할 닉네임" value="${nickname}">
      </div>
      <div class="field" style="animation-delay:0.1s">
        <label>이메일</label>
        <input id="email" type="email" placeholder="이메일 주소" value="${email}">
      </div>
      <button class="btn btn-primary" id="regBtn" style="animation-delay:0.15s" onclick="submitRegister()">회원가입</button>
    `;
  }

  async function submitRegister() {
    const email = document.getElementById('email').value.trim();
    const nickname = document.getElementById('nickname').value.trim();
    if (!email || !nickname) { alert('이메일과 닉네임을 모두 입력해주세요.'); return; }

    const btn = document.getElementById('regBtn');
    btn.disabled = true;

    try {
      const res = await fetch('/api/verify/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, nickname })
      });
      const data = await res.json();

      if (!data.success) {
        alert(data.message);
        btn.disabled = false;
      } else {
        savedEmail = email;
        savedNickname = nickname;
        renderStep2();
      }
    } catch (e) {
      alert('네트워크 오류가 발생했습니다.');
      btn.disabled = false;
    }
  }

  /* ── STEP 2: 인증 코드 ── */
  function renderStep2() {
    content.innerHTML = `
      <p class="step-label" style="animation-delay:0s">이메일로 발송된 6자리 코드를 입력하세요</p>
      <div class="code-row" id="codeRow">
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
      </div>
      <button class="btn btn-primary" id="verifyBtn" style="animation-delay:0.1s" onclick="submitVerify()">인증</button>
    `;

    const inputs = document.querySelectorAll('#codeRow input');
    inputs.forEach((inp, i) => {
      inp.addEventListener('input', () => {
        inp.value = inp.value.replace(/\D/g, '').slice(-1);
        if (inp.value && i < 5) inputs[i + 1].focus();
        inp.classList.toggle('filled', !!inp.value);
      });
      inp.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !inp.value && i > 0) {
          inputs[i - 1].focus();
          inputs[i - 1].value = '';
          inputs[i - 1].classList.remove('filled');
        }
      });
      inp.addEventListener('paste', e => {
        e.preventDefault();
        const pasted = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g,'').slice(0,6);
        [...pasted].forEach((ch, idx) => {
          if (inputs[idx]) { inputs[idx].value = ch; inputs[idx].classList.add('filled'); }
        });
        if (inputs[Math.min(pasted.length, 5)]) inputs[Math.min(pasted.length, 5)].focus();
      });
    });
    inputs[0].focus();
  }

  async function submitVerify() {
    const inputs = document.querySelectorAll('#codeRow input');
    const code = [...inputs].map(i => i.value).join('');
    if (code.length < 6) { alert('6자리 코드를 모두 입력해주세요.'); return; }

    const btn = document.getElementById('verifyBtn');
    btn.disabled = true;

    try {
      const res = await fetch('/api/verify/check', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: savedEmail, code })
      });
      const data = await res.json();

      if (!data.success) {
        if (data.status === -205) {
          alert('expired');
          renderStep1(savedEmail, savedNickname);
        } else {
          alert(data.message);
          btn.disabled = false;
        }
      } else {
        savedHashedCode = data.hashedCode;
        renderStep3();
      }
    } catch (e) {
      alert('네트워크 오류가 발생했습니다.');
      btn.disabled = false;
    }
  }

  /* ── STEP 3: 비밀번호 ── */
  function renderStep3() {
    content.innerHTML = `
      <div class="field" style="animation-delay:0.05s">
        <label>비밀번호</label>
        <input id="pw1" type="password" placeholder="비밀번호 입력">
      </div>
      <div class="field" style="animation-delay:0.1s">
        <label>비밀번호 재확인</label>
        <input id="pw2" type="password" placeholder="비밀번호 재입력">
      </div>
      <button class="btn btn-primary" id="confirmBtn" style="animation-delay:0.15s" onclick="submitPassword()">확인</button>
    `;
  }

  async function submitPassword() {
    const pw1 = document.getElementById('pw1').value;
    const pw2 = document.getElementById('pw2').value;
    if (!pw1) { alert('비밀번호를 입력해주세요.'); return; }
    if (pw1 !== pw2) { alert('비밀번호가 일치하지 않습니다.'); return; }

    const btn = document.getElementById('confirmBtn');
    btn.disabled = true;

    try {
      const res = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: savedEmail, password: pw1, code: savedHashedCode })
      });
      const data = await res.json();

      if (!data.success) {
        if (data.status === -205) {
          alert('expired');
          renderStep1();
        } else {
          alert(data.message);
          btn.disabled = false;
        }
      } else {
        alert('성공');
        savedEmail = ''; savedNickname = ''; savedHashedCode = '';
        renderStep1();
      }
    } catch (e) {
      alert('네트워크 오류가 발생했습니다.');
      btn.disabled = false;
    }
  }

  // init
  renderStep1();
</script>
</body>
</html>
